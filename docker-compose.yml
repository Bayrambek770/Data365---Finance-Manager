version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: xisob
      POSTGRES_USER: xisob_user
      POSTGRES_PASSWORD: xisob_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xisob_user -d xisob"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql://xisob_user:xisob_pass@db:5432/xisob
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m backend.seed &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      - DATABASE_URL=postgresql://xisob_user:xisob_pass@db:5432/xisob
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m bot.main

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
